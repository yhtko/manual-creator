<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手順記録</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <p class="eyebrow">業務手順書</p>
        <h1>操作記録</h1>
      </header>

      <section class="status-card">
        <span id="statusBadge" class="badge">停止中</span>
        <p id="statusText">現在 0 ステップです。</p>
      </section>

      <div class="actions">
        <button id="startButton" class="primary" type="button">記録開始</button>
        <button id="stopButton" type="button">記録停止して保存</button>
      </div>

      <button id="clearButton" class="ghost" type="button">記録を破棄</button>

      <section class="steps-block">
        <h2>記録ステップ</h2>
        <ol id="stepList" class="step-list"></ol>
      </section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
